apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: store
  labels:
    project: online-store
    component: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      project: online-store
      component: product-service
  template:
    metadata:
      labels:
        project: online-store
        component: product-service
    spec:
      containers:
      - name: product-service
        image: devopsrinu/product-service:v1
        imagePullPolicy: Always
        ports:
          - containerPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: store
  labels:
    project: online-store
    component: product-service
spec:
  selector:
    project: online-store
    component: product-service
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082
