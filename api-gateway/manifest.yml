apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: store
  labels:
    project: online-store
    component: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      project: online-store
      component: api-gateway
  template:
    metadata:
      labels:
        project: online-store
        component: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: devopsrinu/api-gateway:v1
        imagePullPolicy: Always
        ports:
          - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: store
  labels:
    project: online-store
    component: api-gateway
spec:
  selector:
    project: online-store
    component: api-gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
