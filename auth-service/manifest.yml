apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: store
  labels:
    project: online-store
    component: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      project: online-store
      component: auth-service
  template:
    metadata:
      labels:
        project: online-store
        component: auth-service
    spec:
      containers:
      - name: auth-service
        image: devopsrinu/auth-service:v1
        imagePullPolicy: Always
        ports:
          - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: store
  labels:
    project: online-store
    component: auth-service
spec:
  selector:
    project: online-store
    component: auth-service
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
