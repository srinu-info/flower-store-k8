apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: store
  labels:
    project: online-store
    component: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      project: online-store
      component: order-service
  template:
    metadata:
      labels:
        project: online-store
        component: order-service
    spec:
      containers:
      - name: order-service
        image: devopsrinu/order-service:v1
        imagePullPolicy: Always
        ports:
          - containerPort: 8084
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: store
  labels:
    project: online-store
    component: order-service
spec:
  selector:
    project: online-store
    component: order-service
  ports:
    - protocol: TCP
      port: 8084
      targetPort: 8084
